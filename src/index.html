<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MisLaminas 26</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <header>
        <div class="header-row-1">
            <span class="app-title">MisLaminas 26</span>
            <div class="header-actions">
                <button id="btn-header-compartir" class="header-icon-btn" title="Compartir progreso">
                    <svg viewBox="0 0 24 24" class="header-icon">
                        <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/>
                    </svg>
                </button>
                <button id="btn-nav-menu" class="header-icon-btn" title="Menú principal">
                    <svg viewBox="0 0 24 24" class="header-icon">
                        <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
                    </svg>
                </button>
            </div>
        </div>
        <div class="header-row-2">
            <div class="progress-container">
                <div id="progress-bar"></div>
                <span id="progress-text">0 / 994 (0.0%) FALTAN 994</span>
            </div>
            <div id="search-container" class="search-container" style="display: none;">
                <svg class="search-icon" viewBox="0 0 24 24">
                    <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                <input type="text" id="input-busqueda" placeholder="Buscar país o selección..." autocomplete="off">
            </div>
        </div>
    </header>

    <main id="album-container">
        </main>

    <footer class="bottom-nav">
        <button id="btn-nav-principal" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="nav-label">Principal</span>
        </button>

        <button id="btn-nav-faltantes" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-4.41 13.41L12 13.83l-2.59 2.58L8 15l2.59-2.59L8 9.83 9.41 8.42 12 11.01l2.59-2.59L16 9.83l-2.59 2.59L16 15l-1.41 1.41z"/>
            </svg>
            <span class="nav-label">Faltantes</span>
        </button>

        <button id="btn-nav-repetidas" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/>
            </svg>
            <span class="nav-label">Repetidas</span>
        </button>

        <button id="btn-nav-centro" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
            <span class="nav-label">Buscar</span>
        </button>

        <button id="btn-nav-intercambiar" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
            <path d="M6.99 11L3 14.99l3.99 3.99V16H14v-2H6.99v-3zM21 9l-3.99-3.99V8H10v2h7.01v2.99L21 9z"/>
        </svg>
            <span class="nav-label">Intercambiar</span>
        </button>
    </footer>

    <!-- MENÚ DESPLEGABLE ACTUALIZADO -->
    <div id="menu-overlay" class="menu-overlay"></div>
    <div id="menu-desplegable" class="menu-desplegable">
        <div class="menu-header">
            <div class="menu-drag-indicator"></div>
            <h3>Menú Principal</h3>
        </div>
        <div class="menu-content">
            <!-- OPCIÓN 1: Instalar trasladada aquí -->
            <button id="btn-menu-instalar" class="menu-option-btn">
                <svg viewBox="0 0 24 24"><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/></svg>
                <span>Instalar como aplicación</span>
            </button>

            <button id="btn-menu-buscar" class="menu-option-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                <span id="txt-btn-buscar">Búsqueda por texto</span>
            </button>

            <button id="btn-export-qr" class="menu-option-btn">
                <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                <span>Exportar Álbum</span>
            </button>

            <button id="btn-import-qr" class="menu-option-btn">
                <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
                <span>Importar Álbum</span>
            </button>
            
            <button class="menu-option-btn disabled" style="opacity: 0.35; pointer-events: none;">
                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .43-.17.47-.41l-.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                <span>Ajustes de la App (Próximamente)</span>
            </button>
        </div>
    </div>

    <div id="menu-compartir-overlay" class="menu-overlay"></div>
    <div id="menu-compartir-desplegable" class="menu-desplegable">
        <div class="menu-header">
            <div class="menu-drag-indicator"></div>
            <h3>Compartir</h3>
        </div>
        <div class="menu-content">
            <button id="btn-share-faltantes" class="menu-option-btn">
                <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-4.41 13.41L12 13.83l-2.59 2.58L8 15l2.59-2.59L8 9.83 9.41 8.42 12 11.01l2.59-2.59L16 9.83l-2.59 2.59L16 15l-1.41 1.41z"/>
               </svg>
                <span>Faltantes</span>
            </button>
            <button id="btn-share-repetidas" class="menu-option-btn">
                <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/>
            </svg>
                <span>Repetidas</span>
            </button>
            <button id="btn-share-ambas" class="menu-option-btn">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M22 7h-9v10h9V7zm-11 6H3v2h8v-2zm0-4H3v2h8V9zm0 8H3v2h8v-2zM2 4.5C2 3.67 2.67 3 3.5 3h17c.83 0 1.5.67 1.5 1.5v1H2v-1z"/></svg>
                <span>Faltantes y Repetidas</span>
            </button>
        </div>
    </div>
    
    <div id="modal-exportar" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <h3>Tu Álbum en QR</h3>
        <p>Comparte esta imagen para transferir tu progreso.</p>
        
        <div id="qr-code-container" style="background: white; padding: 15px; border-radius: 8px; margin: 15px auto; display: inline-block;"></div>
        
        <button class="btn-cerrar-modal" id="btn-compartir-qr-img">Compartir</button>

        <button class="btn-cerrar-modal" id="btn-cerrar-exportar">Cerrar</button>
    </div>
</div>

<div id="modal-importar" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <h3>Importar Progreso</h3>
        <div id="reader" style="width: 100%;"></div>
        
        <button id="btn-cargar-qr-imagen" class="menu-option-btn" style="margin-top: 15px; margin-bottom: 10px; background-color: #1e293b; border: 1px solid var(--primary-blue);">
            <svg style="width:20px; height:20px; fill:var(--text-white); margin-right:8px; vertical-align:middle;" viewBox="0 0 24 24">
                <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
            </svg>
            <span>Cargar desde Galería (Imagen)</span>
        </button>

        <input type="file" id="qr-file-input" accept="image/*" style="display: none;">
        <div id="qr-file-reader-dummy" style="display: none;"></div>

        <button class="btn-cerrar-modal" id="btn-cerrar-importar">Cerrar</button>
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
